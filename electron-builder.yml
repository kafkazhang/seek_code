appId: com.seekcode.app
productName: SeekCode
# CI 多平台产物命名：SeekCode-0.1.0-win-x64.exe / SeekCode-0.1.0-mac-arm64.dmg
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  # 本地 OCR 字库：随包分发到 process.resourcesPath/tessdata（见 src/main/ocr.ts）
  - from: resources/tessdata
    to: tessdata
asarUnpack:
  - resources/**
win:
  target: nsis
mac:
  target: dmg
  category: public.app-category.developer-tools
linux:
  target: AppImage
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
